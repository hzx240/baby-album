# ========================================
# Promtail 配置文件
# ========================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# 日志抓取配置
scrape_configs:
  # ========================================
  # Docker 容器日志
  # ========================================
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 提取容器名称
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name
      # 提取镜像名称
      - source_labels: [__meta_docker_image_name]
        target_label: image_name
      # 添加服务标签（基于容器名称）
      - source_labels: [__meta_docker_container_name]
        regex: '/baby-album-(.*)'
        target_label: service
      # 添加环境标签
      - source_labels: [__meta_docker_container_label_com_docker_compose_environment]
        target_label: environment
      # 添加部署标签
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: deployment
    pipeline_stages:
      # 解析 JSON 日志
      - json:
          expressions:
            level: level
            message: message
            timestamp: time
            context: context
      # 解析时间戳
      - timestamp:
          source: timestamp
          format: RFC3339
      # 添加标签
      - labels:
          level:
          service:

  # ========================================
  # 系统日志
  # ========================================
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/**/*.log
    pipeline_stages:
      # 解析常见日志格式
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\w+)\s+(?P<process>\w+)(\[(?P<pid>\d+)\])?:\s*(?P<message>.*)$'
      - timestamp:
          source: timestamp
          format: "Jan 02 15:04:05"
      - labels:
          process:
          host:

  # ========================================
  # Nginx 访问日志
  # ========================================
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      # 解析 Nginx 访问日志
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time_local>[^\]]+)\] "(?P<method>\w+) (?P<path>[^ ]+) (?P<protocol>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          method:
          status:
          remote_addr:

  # ========================================
  # Nginx 错误日志
  # ========================================
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      # 解析 Nginx 错误日志
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)$'
      - timestamp:
          source: timestamp
          format: "2006/01/02 15:04:05"
      - labels:
          level:
