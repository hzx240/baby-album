# ========================================
# Application Performance Alerts
# ========================================

groups:
  # ========================================
  # 应用性能告警
  # ========================================
  - name: application_performance
    interval: 30s
    rules:
      # API响应时间P95超过500ms
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API P95响应时间过高"
          description: "API路径 {{ $labels.path }} 的 P95 延迟超过500ms (当前值: {{ $value }}s)"

      # API错误率超过5%
      - alert: HighAPIErrorRate
        expr: |
          (sum(rate(http_requests_total{job="backend",status=~"5.."}[5m])) /
          sum(rate(http_requests_total{job="backend"}[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API错误率过高"
          description: "API错误率超过5% (当前值: {{ $value | humanizePercentage }})"

      # API请求量异常检测
      - alert: UnusualAPIRequestSpike
        expr: |
          sum(rate(http_requests_total{job="backend"}[5m])) >
          3 * sum(rate(http_requests_total{job="backend"}[10m:5m]))
        for: 2m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "API请求量异常增长"
          description: "API请求量在最近2分钟内增长了2倍以上"

  # ========================================
  # 数据库性能告警
  # ========================================
  - name: database_performance
    interval: 30s
    rules:
      # 数据库连接池使用率过高
      - alert: PostgresConnectionPoolExhausted
        expr: |
          (sum(pg_stat_database_numbackends{datname="babyalbum"}) /
          sum(pg_settings_max_connections)) > 0.9
        for: 5m
        labels:
          severity: critical
          team: dba
        annotations:
          summary: "PostgreSQL连接池即将耗尽"
          description: "数据库连接使用率超过90%"

      # 数据库慢查询增多
      - alert: PostgresSlowQueries
        expr: |
          sum(rate(pg_stat_statements_calls{datname="babyalbum"}[5m])) > 100
        for: 10m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL慢查询增多"
          description: "检测到大量慢查询 (>100次/秒)"

      # 数据库复制延迟过高
      - alert: PostgresReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL复制延迟过高"
          description: "复制延迟 {{ $value }} 秒"

      # 数据库事务回滚增多
      - alert: PostgresHighRollbackRate
        expr: |
          rate(pg_stat_database_xact_rollback[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "PostgreSQL事务回滚率过高"
          description: "事务回滚率超过0.1次/秒"

  # ========================================
  # Redis缓存告警
  # ========================================
  - name: redis_performance
    interval: 30s
    rules:
      # Redis内存使用率过高
      - alert: RedisHighMemoryUsage
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.9
        for: 10m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "Redis内存使用率过高"
          description: "Redis内存使用率超过90%"

      # Redis缓存命中率过低
      - alert: RedisLowCacheHitRate
        expr: |
          (rate(redis_keyspace_hits_total[5m]) /
          (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))) < 0.6
        for: 15m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "Redis缓存命中率过低"
          description: "Redis缓存命中率低于60% (当前值: {{ $value | humanizePercentage }})"

      # Redis连接数过高
      - alert: RedisTooManyConnections
        expr: |
          (redis_connected_clients / redis_config_maxclients) > 0.8
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "Redis连接数过高"
          description: "Redis连接使用率超过80%"

      # Redis键驱逐增多
      - alert: RedisHighEvictionRate
        expr: |
          rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: dba
        annotations:
          summary: "Redis键驱逐速率过高"
          description: "每秒驱逐的键超过10个"

  # ========================================
  # 前端性能告警
  # ========================================
  - name: frontend_performance
    interval: 30s
    rules:
      # 前端错误率过高
      - alert: HighFrontendErrorRate
        expr: |
          (sum(rate(http_requests_total{job="nginx",status=~"5.."}[5m])) /
          sum(rate(http_requests_total{job="nginx"}[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
          team: frontend
        annotations:
          summary: "前端错误率过高"
          description: "Nginx错误率超过5%"

      # 前端响应时间P95过高
      - alert: HighFrontendLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="nginx"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          team: frontend
        annotations:
          summary: "前端响应时间过高"
          description: "Nginx P95响应时间超过1秒"

  # ========================================
  # 业务指标告警
  # ========================================
  - name: business_metrics
    interval: 60s
    rules:
      # 上传失败率过高
      - alert: HighUploadFailureRate
        expr: |
          (sum(rate(photo_upload_failed_total[5m])) /
          sum(rate(photo_upload_total[5m]))) > 0.1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "照片上传失败率过高"
          description: "上传失败率超过10%"

      # 用户登录失败率过高
      - alert: HighLoginFailureRate
        expr: |
          (sum(rate(user_login_failed_total[5m])) /
          sum(rate(user_login_total[5m]))) > 0.1
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "用户登录失败率过高"
          description: "登录失败率超过10% - 可能是暴力破解"

      # 活跃用户数骤降
      - alert: SuddenDropInActiveUsers
        expr: |
          (sum(active_users[5m]) / sum(active_users[1h:5m])) < 0.5
        for: 5m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "活跃用户数骤降"
          description: "活跃用户数在5分钟内下降了超过50%"
