# ========================================
# Prometheus 配置文件
# ========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'baby-album'
    environment: 'production'

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 数据抓取配置
scrape_configs:
  # ========================================
  # Prometheus 自身监控
  # ========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ========================================
  # 容器指标 (cAdvisor)
  # ========================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'

  # ========================================
  # 主机指标 (Node Exporter)
  # ========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # ========================================
  # 后端服务
  # ========================================
  - job_name: 'backend'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['backend:3010']
        labels:
          service: 'backend'
          application: 'baby-album-api'
    scrape_interval: 30s

  # ========================================
  # PostgreSQL Exporter
  # ========================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  # ========================================
  # Redis Exporter
  # ========================================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # ========================================
  # Nginx 监控 (需要 nginx-prometheus-exporter)
  # ========================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx'

  # ========================================
  # Docker Container Metrics
  # ========================================
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
        labels:
          service: 'docker'
