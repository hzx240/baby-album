version: '3.8'

# ========================================
# 宝贝成长相册 - Docker Compose 主配置
# ========================================
# 使用方法：
#   - 开发环境: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#   - 生产环境: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#   - 带监控: docker-compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml up

services:
  # ========================================
  # 前端服务 - Nginx 静态文件
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    image: baby-album-frontend:${IMAGE_TAG:-latest}
    container_name: baby-album-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - baby-album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========================================
  # 后端服务 - NestJS API
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: baby-album-backend:${IMAGE_TAG:-latest}
    container_name: baby-album-backend
    ports:
      - "${BACKEND_PORT:-3010}:3010"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3010
      - DATABASE_URL=${DATABASE_URL:-postgresql://babyuser:babypass@postgres:5432/babyalbum?schema=public}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-30d}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-baby-photos}
      - S3_REGION=${S3_REGION:-us-east-1}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-500}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - baby-album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # PostgreSQL 数据库
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: baby-album-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-babyuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-babypass}
      - POSTGRES_DB=${POSTGRES_DB:-babyalbum}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-backup.sh:/backup.sh:ro
    networks:
      - baby-album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babyuser} -d ${POSTGRES_DB:-babyalbum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 性能优化参数
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"

  # ========================================
  # MinIO 对象存储
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: baby-album-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - baby-album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: baby-album-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --tcp-keepalive 300
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
    volumes:
      - redis-data:/data
    networks:
      - baby-album-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# ========================================
# 网络配置
# ========================================
networks:
  baby-album-network:
    driver: bridge
    name: baby-album-network

# ========================================
# 数据卷配置
# ========================================
volumes:
  postgres-data:
    name: baby-album-postgres-data
    driver: local
  minio-data:
    name: baby-album-minio-data
    driver: local
  redis-data:
    name: baby-album-redis-data
    driver: local
