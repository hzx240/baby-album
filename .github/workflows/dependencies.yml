# ========================================
# 宝贝成长相册 - 依赖更新检查
# ========================================
# 功能:
# - 每周一检查依赖更新
# - 检测安全漏洞
# - 自动创建 PR
# ========================================

name: Dependencies

on:
  schedule:
    # 每周一上午 9:00 (UTC) 运行
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  # ========================================
  # 检查后端依赖更新
  # ========================================
  backend-deps:
    name: Backend Dependencies Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Check for outdated packages
        run: |
          cd backend
          npm outdated --json > outdated.json || true
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat outdated.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run security audit
        run: |
          cd backend
          npm audit --json > audit.json || true
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat audit.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for vulnerabilities
        run: |
          cd backend
          npm audit --audit-level=moderate
        continue-on-error: true

  # ========================================
  # 检查前端依赖更新
  # ========================================
  frontend-deps:
    name: Frontend Dependencies Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Check for outdated packages
        run: |
          cd frontend
          npm outdated --json > outdated.json || true
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat outdated.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run security audit
        run: |
          cd frontend
          npm audit --json > audit.json || true
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat audit.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for vulnerabilities
        run: |
          cd frontend
          npm audit --audit-level=moderate
        continue-on-error: true

  # ========================================
  # Docker 基础镜像检查
  # ========================================
  docker-base:
    name: Docker Base Images Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node.js base image
        run: |
          echo "## Docker Base Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Node.js" >> $GITHUB_STEP_SUMMARY
          docker pull node:18-alpine
          docker images | grep node | grep alpine >> $GITHUB_STEP_SUMMARY || true

      - name: Check Nginx base image
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Nginx" >> $GITHUB_STEP_SUMMARY
          docker pull nginx:1.25-alpine
          docker images | grep nginx | grep alpine >> $GITHUB_STEP_SUMMARY || true

      - name: Check PostgreSQL base image
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PostgreSQL" >> $GITHUB_STEP_SUMMARY
          docker pull postgres:15-alpine
          docker images | grep postgres | grep alpine >> $GITHUB_STEP_SUMMARY || true

  # ========================================
  # 生成依赖报告
  # ========================================
  report:
    name: Dependency Report
    runs-on: ubuntu-latest
    needs: [backend-deps, frontend-deps, docker-base]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Dependency Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ needs.backend-deps.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ needs.frontend-deps.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Base**: ${{ needs.docker-base.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "- Review outdated packages" >> $GITHUB_STEP_SUMMARY
          echo "- Update packages with security vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- Test updates in development environment first" >> $GITHUB_STEP_SUMMARY

      - name: Check for high vulnerabilities
        run: |
          echo "::notice::Dependency check completed. Review the summary for details."
